<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Travel Assistant AI Chatbot</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="chatbot-container">
        <aside class="sidebar">
            <h2>Travel Assistant Settings</h2>
            
            <div class="form-group">
                <label for="tone-select">Language Style</label>
                <select id="tone-select">
                    <option value="Casual">Casual</option>
                    <option value="Formal">Formal</option>
                    <option value="Enthusiastic">Enthusiastic</option>
                </select>
            </div>
            
            <div class="form-group">
                <label for="topic-input">Specific Topic (Optional)</label>
                <input type="text" id="topic-input" placeholder="e.g. Route recommendations in Japan">
            </div>

            <button id="start-chat-btn">Start / Reset Chat</button>
            <p class="status-message" id="status-message"></p>
        </aside>

        <main class="chat-main">
            <header>
                <h1>Travel Assistant Bot</h1>
            </header>
            
            <div class="chat-window" id="chat-window">
                <div class="message bot-message">
                    Hello! I'm your Travel Assistant. How can I help you today?
                </div>
            </div>
            
            <div class="chat-input-area">
                <input type="text" id="user-input" placeholder="Type your message here..." disabled>
                <button id="send-btn" disabled>Send</button>
            </div>
        </main>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="app.js"></script>
</body>
</html>
